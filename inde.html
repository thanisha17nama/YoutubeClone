<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="youtubeicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>


<header class="header">
    <div class="left">
        <i class="fa-solid fa-bars"></i>
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="logo">
    </div>

    <div class="center">
        <input type="text" placeholder="Search">
        <button><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>

    <div class="right">
        <i class="fa-regular fa-video"></i>
        <i class="fa-regular fa-bell"></i>
        <img src="https://i.pravatar.cc/40" class="avatar">
    </div>
</header>

<div class="container">

    
    <aside class="sidebar">
        <div class="side-item active"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="side-item"><i class="fa-solid fa-bolt"></i><span>Shorts</span></div>
        <div class="side-item"><i class="fa-solid fa-tv"></i><span>Subscriptions</span></div>
        <hr>
        <div class="side-item"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></div>
        <div class="side-item"><i class="fa-solid fa-list"></i><span>Playlists</span></div>
    </aside>

    
    <main class="videos">
        <div class="video-card">
            <img src="https://picsum.photos/400/230?1" class="thumbnail">
            <div class="video-info">
                <img src="https://i.pravatar.cc/36" class="channel-img">
                <div>
                    <h4>Realistic YouTube Clone using HTML & CSS</h4>
                    <p>CodeWithMe</p>
                    <span>1.2M views • 2 days ago</span>
                </div>
            </div>
        </div>

        <div class="video-card">
            <img src="https://picsum.photos/400/230?2" class="thumbnail">
            <div class="video-info">
                <img src="https://i.pravatar.cc/36?img=2" class="channel-img">
                <div>
                    <h4>Frontend Projects for Beginners</h4>
                    <p>Web Dev Hub</p>
                    <span>850K views • 1 week ago</span>
                </div>
            </div>
        </div>

        <div class="video-card">
            <img src="https://picsum.photos/400/230?3" class="thumbnail">
            <div class="video-info">
                <img src="https://i.pravatar.cc/36?img=3" class="channel-img">
                <div>
                    <h4>CSS Flexbox in 15 Minutes</h4>
                    <p>Design Daily</p>
                    <span>540K views • 3 days ago</span>
                </div>
            </div>
        </div>
    </main>
</div>

</body>
</html>
